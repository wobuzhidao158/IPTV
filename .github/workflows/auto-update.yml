name: 电信专属·直播源自动更新（阿克苏终极稳定版）

on:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时自动运行，北京时间8/14/20/2点
  workflow_dispatch:       # 支持手动一键触发
  push:
    branches: [ main ]
    paths-ignore:          # 忽略无关文件，避免无效触发
      - '*.md'
      - 'README.md'

permissions:
  contents: write          # 写入权限，提交不报错

# 🔴 核心：彻底解决排队卡死，同一分支只跑一个任务
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15   # 超时保护，15分钟自动结束，防止卡死
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置国内Python镜像+环境（新疆网络秒装依赖）
        run: |
          pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          pip config set global.trusted-host pypi.tuna.tsinghua.edu.cn
          export LANG=C.UTF-8

      - name: Git 全局安全配置
        run: |
          git config --global --add safe.directory /github/workspace
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 配置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'  # 🚀 依赖缓存，下次运行秒启动

      - name: 安装依赖（稳定版）
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 生成咪咕1080P源
        env:
          MIGU_UID: ${{ secrets.MIGU_UID }}
          MIGU_TOKEN: ${{ secrets.MIGU_TOKEN }}
        run: python migu.py

      - name: 合并私源+电信过滤+阿克苏IP优化+4K8K分离
        run: python update.py

      - name: 提交推送（彻底解决冲突）
        run: |
          git pull origin main --rebase --autostash
          git add *.m3u
          git commit -m "🔄 自动更新(阿克苏本地IP) [skip ci]" || echo "无变更，跳过提交"
          git push origin main
