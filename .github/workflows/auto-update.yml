# -*- coding: utf-8 -*-
"""
完全本地版直播源更新脚本
零外网依赖，仅读取本地文件、生成输出，无任何网络请求
"""
import os
from datetime import datetime

# -------------------------- 配置区（已适配你的文件名） --------------------------
# 你的本地直播源文件路径（仓库根目录下的文件名）
INPUT_FILE = "直播源.txt"
# 生成的最终直播源文件路径（给播放器/APP用的文件）
OUTPUT_FILE = "iptv.m3u"
# 日志文件路径（可选，记录每次更新时间）
LOG_FILE = "update_log.txt"
# ----------------------------------------------------------------------

def main():
    # 1. 检查输入文件是否存在
    if not os.path.exists(INPUT_FILE):
        print(f"❌ 错误：输入文件 {INPUT_FILE} 不存在，跳过更新")
        with open(LOG_FILE, "a", encoding="utf-8") as f:
            f.write(f"[{datetime.now().strftime('%Y-%m-%d %H:%M:%S')}] 错误：{INPUT_FILE} 不存在\n")
        return

    # 2. 读取本地直播源
    try:
        with open(INPUT_FILE, "r", encoding="utf-8") as f:
            lines = f.readlines()
        print(f"✅ 成功读取 {len(lines)} 行直播源数据")
    except Exception as e:
        print(f"❌ 读取文件失败：{str(e)}")
        with open(LOG_FILE, "a", encoding="utf-8") as f:
            f.write(f"[{datetime.now().strftime('%Y-%m-%d %H:%M:%S')}] 读取失败：{str(e)}\n")
        return

    # 3. 生成标准M3U格式（可根据你的需求修改格式）
    # 标准M3U头，兼容绝大多数播放器
    m3u_content = ["#EXTM3U x-tvg-url=\"\""]
    # 直接追加本地直播源（如果你的直播源.txt已经是标准M3U格式，可直接复制；这里做通用处理）
    for line in lines:
        line = line.strip()
        if line and not line.startswith("#"):  # 跳过空行和注释，按需调整
            # 这里可以加自定义处理，比如批量替换域名、添加分组等
            m3u_content.append(line)

    # 4. 写入最终M3U文件
    try:
        with open(OUTPUT_FILE, "w", encoding="utf-8") as f:
            f.write("\n".join(m3u_content) + "\n")
        print(f"✅ 成功生成 {OUTPUT_FILE}，共 {len(m3u_content)-1} 个直播源")
    except Exception as e:
        print(f"❌ 写入文件失败：{str(e)}")
        with open(LOG_FILE, "a", encoding="utf-8") as f:
            f.write(f"[{datetime.now().strftime('%Y-%m-%d %H:%M:%S')}] 写入失败：{str(e)}\n")
        return

    # 5. 记录更新日志
    with open(LOG_FILE, "a", encoding="utf-8") as f:
        f.write(f"[{datetime.now().strftime('%Y-%m-%d %H:%M:%S')}] 成功更新，直播源数量：{len(m3u_content)-1}\n")
    print(f"✅ 更新日志已写入 {LOG_FILE}")

if __name__ == "__main__":
    main()
