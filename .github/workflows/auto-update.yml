name: 直播源自动更新
# 👇 关键：强制赋予读写权限，解决手动触发权限不足
permissions:
  contents: write  # 允许读写仓库内容（提交M3U文件必须）
  actions: write   # 允许操作Actions
  pull-requests: write  # 可选，按需开启

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true  # 👇 关键：保留凭证，允许后续步骤提交
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      - name: Run update script
        run: python update.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # 👇 关键：传递token给脚本

on:
  push:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install requests

      - name: 运行更新脚本
        run: python3 update.py

      - name: 强制提交
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "每日0点自动更新" --allow-empty || echo "无变化，跳过"
          git push
