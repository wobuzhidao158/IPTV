name: 私源优先直播源自动更新

on:
  schedule:
    - cron: '0 */6 * * *'      # 每6小时运行一次
  workflow_dispatch:            # 允许手动触发
  push:
    branches: [ main ]          # 推送代码时触发

permissions:
  contents: write               # 授予写入权限

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false     # 不自动取消正在运行的任务

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30         # 总超时30分钟

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install requests

      - name: 生成咪咕1080P源（含失效重试）
        env:
          MIGU_UID: ${{ secrets.MIGU_UID }}
          MIGU_TOKEN: ${{ secrets.MIGU_TOKEN }}
        run: python migu.py
        timeout-minutes: 10

      - name: 运行私源优先+4K8K分类脚本
        run: python update.py
        timeout-minutes: 25     # 脚本运行超时25分钟

      - name: 提交并推送更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main --rebase --autostash
          git add *.m3u *.txt
          git commit -m "🔄 自动更新直播源 [skip ci]" || echo "无变更跳过提交"
          git push --force-with-lease origin HEAD
