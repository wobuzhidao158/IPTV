# -*- coding: utf-8 -*-
# 最终版：完全匹配你的仓库，零修改直接用
# 功能：本地运行+自动去重+过滤无效源+生成标准M3U+日志记录
import os
from datetime import datetime

# 🔴 这里严格对应你仓库里的文件名：直播源.txt，绝对不会错
INPUT_FILE = "直播源.txt"
OUTPUT_FILE = "iptv.m3u"
LOG_FILE = "update_log.txt"

def main():
    # 1. 检查文件是否存在
    if not os.path.exists(INPUT_FILE):
        print(f"❌ 错误：找不到 {INPUT_FILE}，请确认文件名正确")
        with open(LOG_FILE, "a", encoding="utf-8") as f:
            f.write(f"[{datetime.now().strftime('%Y-%m-%d %H:%M:%S')}] 错误：{INPUT_FILE} 不存在\n")
        return

    # 2. 读取直播源
    try:
        with open(INPUT_FILE, "r", encoding="utf-8") as f:
            raw_lines = f.readlines()
        print(f"✅ 成功读取 {len(raw_lines)} 行原始数据")
    except Exception as e:
        print(f"❌ 读取失败：{str(e)}")
        with open(LOG_FILE, "a", encoding="utf-8") as f:
            f.write(f"[{datetime.now().strftime('%Y-%m-%d %H:%M:%S')}] 读取失败：{str(e)}\n")
        return

    # 3. 去重 + 过滤无效源
    seen_urls = set()
    valid_lines = []
    invalid_count = 0
    duplicate_count = 0

    for line in raw_lines:
        line = line.strip()
        # 过滤：空行、#开头的注释、非http/https开头的链接
        if not line or line.startswith("#") or not (line.startswith("http://") or line.startswith("https://")):
            invalid_count += 1
            continue
        # 去重：只保留第一次出现的链接
        if line not in seen_urls:
            seen_urls.add(line)
            valid_lines.append(line)
        else:
            duplicate_count += 1

    print(f"✅ 处理完成：过滤无效源 {invalid_count} 个，去重 {duplicate_count} 个，剩余有效源 {len(valid_lines)} 个")

    # 4. 生成标准M3U格式（兼容所有播放器）
    m3u_content = ["#EXTM3U x-tvg-url=\"\""]
    for idx, url in enumerate(valid_lines, 1):
        m3u_content.append(f'#EXTINF:-1 group-title="我的直播源",频道{idx:03d}')
        m3u_content.append(url)

    # 5. 写入最终M3U文件
    try:
        with open(OUTPUT_FILE, "w", encoding="utf-8") as f:
            f.write("\n".join(m3u_content) + "\n")
        print(f"✅ 成功生成 {OUTPUT_FILE}")
    except Exception as e:
        print(f"❌ 写入失败：{str(e)}")
        with open(LOG_FILE, "a", encoding="utf-8") as f:
            f.write(f"[{datetime.now().strftime('%Y-%m-%d %H:%M:%S')}] 写入失败：{str(e)}\n")
        return

    # 6. 记录日志
    log_msg = (
        f"[{datetime.now().strftime('%Y-%m-%d %H:%M:%S')}] 更新完成\n"
        f"  原始行数：{len(raw_lines)}\n"
        f"  过滤无效源：{invalid_count} 个\n"
        f"  去重重复源：{duplicate_count} 个\n"
        f"  最终有效源：{len(valid_lines)} 个\n"
        "----------------------------------------\n"
    )
    with open(LOG_FILE, "a", encoding="utf-8") as f:
        f.write(log_msg)
    print(f"✅ 日志已写入 {LOG_FILE}")

if __name__ == "__main__":
    main()