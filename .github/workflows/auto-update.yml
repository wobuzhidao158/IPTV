name: 直播源自动更新
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 运行更新脚本
        run: python3 update.py
      - name: 提交更新
        run: |
          git config user.name "wobuzhidao158"
          git config user.email "yanwei921016@gmail.com"
          git add http://zhibo.cc.cd/api.php?token=OawLE8oN&type=m3u
          git commit -m "自动更新直播源 $(date +'%Y-%m-%d %H:%M')"
          git push
