name: 直播源自动更新
permissions:
  contents: write
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: 装Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 装依赖
        run: pip install requests

      - name: 跑脚本生成m3u
        run: python update.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 直接提交保存
        run: |
          git config user.name bot
          git config user.email bot@qq.com
          git add .
          git commit -m update
          git push
