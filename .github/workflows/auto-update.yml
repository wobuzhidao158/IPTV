name: 电信专属·直播源自动更新（阿克苏本地稳定版）
on:
  schedule: [{cron: '0 */6 * * *'}]
  workflow_dispatch:
  push: {branches: [main]}
permissions: {contents: write}
concurrency: {group: ${{ github.workflow }}-${{ github.ref }}, cancel-in-progress: false}
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          git config --global --add safe.directory /github/workspace
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - env:
          MIGU_UID: ${{ secrets.MIGU_UID }}
          MIGU_TOKEN: ${{ secrets.MIGU_TOKEN }}
        run: python migu.py
      - run: python update.py
      - run: |
          git pull origin main --rebase --autostash
          git add *.m3u
          git commit -m "🔄 自动更新(全阿克苏IP) [skip ci]" || echo "无变更"
          git push origin main
