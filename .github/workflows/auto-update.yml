name: 电信专属·直播源自动更新（终极稳定版）

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: Git 安全配置
        run: |
          git config --global --add safe.directory /github/workspace
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install requests -q

      - name: 生成咪咕 1080P 源
        env:
          MIGU_UID: ${{ secrets.MIGU_UID }}
          MIGU_TOKEN: ${{ secrets.MIGU_TOKEN }}
        run: python migu.py

      - name: 合并私源 + 电信低码过滤
        run: python update.py

      - name: 提交推送（彻底解决unstaged冲突）
        run: |
          # 方案1：用--autostash自动暂存，一行解决所有问题（GitHub Actions官方推荐）
          git pull origin main --rebase --autostash
          # 仅添加m3u文件，避免误提交
          git add *.m3u
          # 提交变更（无变更则跳过）
          git commit -m "🔄 自动更新电信直播源 [skip ci]" || echo "无变更，跳过提交"
          # 推送至远程
          git push origin main
