name: 私源优先·电信低码直播源（雷鸟专用）
on:
  schedule: [{cron: '0 */6 * * *'}]
  workflow_dispatch:
  push: {branches: [main]}
permissions: {contents: write}
concurrency: {group: ${{ github.workflow }}-${{ github.ref }}, cancel-in-progress: false}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Git配置
        run: |
          git config --global --add safe.directory /github/workspace
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - name: 生成咪咕1080P（电信专线）
        env:
          MIGU_UID: ${{ secrets.MIGU_UID }}
          MIGU_TOKEN: ${{ secrets.MIGU_TOKEN }}
        run: python migu.py
      - name: 合并·电信低码过滤（雷鸟流畅）
        run: python update.py
      - name: 提交
        run: |
          git pull origin main --rebase --autostash
          git add *.m3u
          git commit -m "🔄 电信低码·自动更新 [skip ci]" || echo "无变更"
          git push origin main
