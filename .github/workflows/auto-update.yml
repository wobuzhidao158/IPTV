name: 直播源自动更新

on:
  push:
  schedule:
    # 北京时间 0:00 = UTC 16:00，定时触发
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置Python环境
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install requests

      - name: 运行更新脚本
        run: python3 update.py

      - name: 强制提交更新（空提交确保触发）
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          # --allow-empty 强制生成空提交，就算没文件变化也能提交，保证更新
          git commit -m "每日0点强制更新直播源" --allow-empty || echo "无变化，跳过提交"
          git push
