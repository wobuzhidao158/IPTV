name: 直播源自动更新

permissions:
  contents: write
  actions: write
  pull-requests: write

on:
  push:
    branches: [ main ]
    # 【关键优化】仅在修改核心文件时触发，避免README提交触发工作流
    paths:
      - 'update.py'
      - '.github/workflows/auto-update.yml'
      - '直播源.txt'
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

# 严格单任务+手动优先，彻底杜绝多任务并行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: 配置Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests --quiet

      - name: 执行更新脚本
        run: python update.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: 提交更新
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main --quiet
          git add *.m3u *.txt
          if [[ -n $(git status --porcelain) ]]; then
            git commit -m "Auto update m3u [skip ci]" --quiet
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main --quiet
          else
            echo "无变更，跳过提交"
          fi
