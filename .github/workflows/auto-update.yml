# 这是自动更新直播源的工作流
name: 直播源自动更新

# 触发条件：每天凌晨0点自动运行，或者手动点击触发
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:  # 允许手动触发

# 运行环境
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取你仓库的代码
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 确保历史记录完整，方便提交

      # 2. 配置Python环境
      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'  # 使用3.11版本，稳定兼容

      # 3. 【关键修复】安装网络请求库 requests
      - name: 安装依赖库
        run: pip install requests

      # 4. 运行更新脚本（核心步骤）
      - name: 运行更新脚本
        run: python3 update.py

      # 5. 提交更改到仓库
      - name: 提交更改
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add 直播源
          git commit -m "Auto: 直播源已更新 $(date +'%Y-%m-%d %H:%M')"
          git push
