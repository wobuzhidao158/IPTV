name: 电信专属·直播源自动更新

on:
  schedule:
    - cron: '0 */6 * * *' # 每6小时自动跑一次
  workflow_dispatch: # 允许手动点运行

permissions:
  contents: write # 必须开启，否则无法提交生成的m3u文件

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 配置Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: 配置Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: 安装依赖
        run: pip install requests -q
      
      - name: 生成咪咕源
        env:
          MIGU_UID: ${{ secrets.MIGU_UID }}
          MIGU_TOKEN: ${{ secrets.MIGU_TOKEN }}
        run: python migu.py
      
      - name: 合并并过滤(电信/1080P)
        run: python update.py
      
      - name: 提交推送
        run: |
          git pull --rebase
          git add ./*.m3u
          git commit -m "🔄 自动更新电信直播源 [skip ci]" || echo "无需提交"
          git push
