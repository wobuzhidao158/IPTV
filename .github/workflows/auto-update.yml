name: 直播源自动更新

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖库
        run: pip install requests

      - name: 运行更新脚本
        run: python3 update.py

      - name: 提交更改
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add 直播源
          git commit -m "Auto: 直播源已更新 $(date +'%Y-%m-%d %H:%M')" || echo "无变更"
          git push git push https://${{ secrets.GITHUB_TOKEN }}@github.com/wobuzhidao158/IPTV.git
