name: 电信专属·直播源自动更新（阿克苏720P零报错终极版）
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]
    paths-ignore:
      - '*.md'
      - 'README.md'
permissions:
  contents: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        continue-on-error: true
      - name: 配置国内镜像
        run: |
          pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          pip config set global.trusted-host pypi.tuna.tsinghua.edu.cn
          export LANG=C.UTF-8
        continue-on-error: true
      - name: Git配置
        run: |
          git config --global --add safe.directory /github/workspace
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
        continue-on-error: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
        continue-on-error: true
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip || true
          pip install requests || true
        continue-on-error: true
      - name: 合并+源检测+自动补新+阿克苏IP
        run: python update.py
        continue-on-error: true
      - name: 强制提交所有m3u文件（修复空文件问题）
        run: |
          git pull origin main --rebase --autostash || true
          git add -f *.m3u  # 🔴 强制添加所有m3u文件，包括iptv.m3u
          git commit -m "🔄 自动更新iptv.m3u [skip ci]" || true
          git push origin main --force || true  # 🔴 强制推送，确保文件更新
        continue-on-error: true
