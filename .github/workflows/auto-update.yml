name: 直播源自动更新

# 全局权限配置，解决手动/自动权限不一致
permissions:
  contents: write
  actions: write
  pull-requests: write

# 触发条件：自动提交/定时/手动触发
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 16 * * *'  # UTC 16:00 = 北京时间 00:00 每日自动更新
  workflow_dispatch:

# 并发控制：禁止多任务同时运行，避免冲突卡死
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 8  # 强制超时，彻底解决30分钟卡死
    steps:
      - name: 拉取完整代码
        uses: actions/checkout@v4
        with:
          persist-credentials: true  # 保留凭证，允许git提交
          fetch-depth: 0              # 拉取完整历史，避免提交冲突

      - name: 配置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"  # 【已修复】开启缓存加速，依赖requirements.txt生效

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt  # 从requirements.txt安装，和缓存对齐

      - name: 执行更新脚本
        run: python update.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: 提交更新文件
        run: |
          # 配置Git用户
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # 拉取最新代码，避免冲突
          git pull origin main
          # 暂存变更
          git add *.m3u *.txt
          # 检查是否有变更，避免空提交
          if [[ -n $(git status --porcelain) ]]; then
            git commit -m "Auto update live sources [skip ci]"
            # 强制用token推送，兼容所有触发方式
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
            echo "✅ 提交成功"
          else
            echo "ℹ️ 无文件变更，跳过提交"
          fi
