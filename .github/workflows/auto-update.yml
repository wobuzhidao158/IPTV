name: 直播源自动更新
permissions:
  contents: write
on:
  push:
    branches: [ main ]
  schedule:
    cron: '0 16 * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: 配置Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 安装依赖
        run: pip install requests
      - name: 执行新疆专属脚本
        run: python update.py
      - name: 提交更新
        run: |
          git config user.name "bot"
          git config user.email "bot@example.com"
          git add .
          git commit -m "auto update for xinjiang" || echo "无变更"
          git push --force
